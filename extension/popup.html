<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Assistant</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <div id="auth-view" class="auth-view">
      <p class="auth-title">Sign in to your account</p>
      <label>Backend URL <input type="text" id="auth-backend-url" placeholder="http://localhost:3000" /></label>
      <label>Email <input type="email" id="auth-email" placeholder="you@example.com" /></label>
      <label>Password <input type="password" id="auth-password" placeholder="••••••••" /></label>
      <div class="auth-actions">
        <button type="button" id="auth-login">Sign in</button>
        <button type="button" id="auth-register">Create account</button>
      </div>
      <p class="auth-or">— or use backend API key in Settings —</p>
      <button type="button" id="auth-open-settings" class="auth-link-settings">Open Settings (API key)</button>
    </div>

    <div id="main-flow" class="main-flow hidden">
      <!-- Chat chrome -->
      <header id="header-chat" class="header">
        <div class="header-brand">
          <div class="header-logo" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
              <path d="M19 3v4M21 5h-4" />
            </svg>
          </div>
          <div class="header-titles">
            <h1 class="header-title">
              <span class="header-title-row1">Personal</span>
              <span class="header-title-row2">Assistant</span>
            </h1>
            <span id="user-label" class="user-label"></span>
          </div>
        </div>
        <div class="header-actions" role="toolbar" aria-label="Header actions">
          <button type="button" id="settings-btn" class="header-btn icon-only" title="Settings" aria-label="Settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          </button>
          <button type="button" id="logout-btn" class="header-btn text-btn hidden" title="Log out">Log out</button>
        </div>
      </header>

      <!-- Settings page header -->
      <header id="header-settings" class="header header-page hidden">
        <button type="button" id="back-from-settings" class="header-btn header-back" aria-label="Back to chat">← Chat</button>
        <h2 class="header-page-title">Settings</h2>
        <span class="header-page-spacer" aria-hidden="true"></span>
      </header>

      <!-- Connectors page header -->
      <header id="header-connectors" class="header header-page hidden">
        <button type="button" id="back-from-connectors" class="header-btn header-back" aria-label="Back to chat">← Chat</button>
        <h2 class="header-page-title">Connectors</h2>
        <span class="header-page-spacer" aria-hidden="true"></span>
      </header>

      <div id="page-chat" class="page page-chat">
        <div id="chat-view" class="chat-area">
          <div id="messages" class="messages"></div>
          <div class="input-row">
            <div class="input-row-top">
              <label class="context-toggle">
                <input type="checkbox" id="include-context" checked />
                Include tab context
              </label>
              <button type="button" id="clear-chat-btn" class="clear-chat-btn" title="Clear chat history">Clear chat</button>
            </div>
            <div class="connectors-info" id="connectors-info" title="Tools (connectors) come from MCP servers configured in the backend">
              <span class="connectors-label">Tools</span>
              <span class="connectors-detail" id="connectors-detail">Demo (echo, add)</span>
            </div>
            <div class="composer composer-3col" id="composer">
              <div class="composer-col composer-col-connectors" aria-hidden="false">
                <button type="button" id="connectors-btn" class="composer-connectors-btn hidden" title="Connectors" aria-label="Connectors">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                </button>
              </div>
              <div class="composer-col composer-col-input">
                <textarea id="input" rows="1" placeholder="Message…" maxlength="32000" aria-label="Message"></textarea>
              </div>
              <div class="composer-col composer-col-send">
                <button type="button" id="send-btn" class="send-btn" aria-label="Send message">
                  <span class="send-btn-label">Send</span>
                  <svg class="send-btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="page-settings" class="page page-settings hidden">
        <div class="page-body">
          <h3 class="settings-section">Backend</h3>
          <label>
            Backend URL (e.g. http://localhost:3000)
            <input type="text" id="backend-url" placeholder="http://localhost:3000" />
          </label>
          <label>
            Backend API Key (auth token for this server)
            <input type="password" id="api-key" placeholder="Your backend API key" />
          </label>
          <h3 class="settings-section">LLM (your API key & model)</h3>
          <label>
            Provider
            <select id="llm-provider">
              <option value="claude">Claude (Anthropic)</option>
              <option value="openai">OpenAI</option>
              <option value="groq">Groq</option>
            </select>
          </label>
          <label>
            LLM API Key
            <input type="password" id="llm-api-key" placeholder="Your provider API key" />
          </label>
          <label>
            Model
            <input type="text" id="llm-model" placeholder="e.g. gpt-4o-mini, claude-sonnet-4-20250514" />
          </label>
          <div class="settings-actions settings-actions-sticky">
            <button type="button" id="save-settings">Save</button>
          </div>
        </div>
      </div>

      <div id="page-connectors" class="page page-connectors hidden">
        <div class="page-body">
          <p class="connectors-hint">Connect your accounts. The assistant can use these when you chat.</p>
          <div id="connectors-list" class="connectors-list"></div>
        </div>
      </div>
    </div>

    <div id="status" class="status"></div>
  </div>

  <div id="connect-modal" class="modal hidden">
    <div class="modal-content">
      <h4 id="connect-modal-title">Connect</h4>
      <label id="connect-label"><span id="connect-label-text">API Key</span> <input type="password" id="connect-api-key" placeholder="Paste your API key" /></label>
      <p id="connect-hint" class="connect-hint hidden"></p>
      <div class="modal-actions">
        <button type="button" id="connect-submit">Connect</button>
        <button type="button" id="connect-cancel">Cancel</button>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
